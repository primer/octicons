name: CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
    branches:
      - main
    types:
      - checks_requested

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Set up turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Set up turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Set up turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.job }}-
            ${{ runner.os }}-turbo-
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Check package types
        run: |
          npx @arethetypeswrong/cli --pack .
          npx publint@0.2.12 . --strict
        working-directory: packages/octicons_react
      - name: Pack public npm packages
        uses: actions/github-script@v7
        with:
          script: |
            const fs = await import('node:fs')
            const path = await import('node:path')

            const directory = path.resolve('packed')
            fs.mkdirSync(directory, {recursive: true})

            core.startGroup('Packing npm packages')

            const {stdout: queryOutput} = await exec.getExecOutput('npm', ['query', '.workspace'])
            const workspaces = JSON.parse(queryOutput)
            const packages = workspaces.filter(pkg => pkg.private !== true).map(pkg => pkg.name)
            core.info(`Packing: ${packages.join(' ')}`)

            const args = ['pack', ...packages.map(name => `--workspace=${name}`), '--pack-destination', directory, '--json']
            const {stdout: packOutput} = await exec.getExecOutput('npm', args)
            const result = JSON.parse(packOutput)

            core.endGroup()

            const metadata = {
              packages: result.map(pkg => ({
                name: pkg.name,
                version: pkg.version,
                path: path.join('packed', pkg.filename),
              })),
            }

            fs.writeFileSync(path.join(directory, 'metadata.json'), JSON.stringify(metadata, null, 2))
            core.info(JSON.stringify(metadata, null, 2))
      - name: Upload packed npm packages
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: |
            packed/*.tgz
            packed/metadata.json
          if-no-files-found: error

  octicons_gem:
    name: 'gem:octicons'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build shared assets
        run: npm run build:icons
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true
      - name: Copy shared assets
        run: cp -R ../build lib/
        working-directory: packages/octicons_gem
      - name: Install gem dependencies
        run: bundle install
        working-directory: packages/octicons_gem
      - name: Lint
        run: bundle exec rake lint
        working-directory: packages/octicons_gem
      - name: Test
        run: bundle exec rake test
        working-directory: packages/octicons_gem
      - name: Build
        run: bundle exec rake build
        working-directory: packages/octicons_gem
      - name: Upload octicons gem
        uses: actions/upload-artifact@v4
        with:
          name: octicons-gem
          path: packages/octicons_gem/pkg

  octicons_helper:
    name: 'gem:octicons_helper'
    runs-on: ubuntu-latest
    needs: octicons_gem
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true
      - name: Download octicons gem
        uses: actions/download-artifact@v4
        with:
          name: octicons-gem
          path: packages/octicons_helper/vendor/cache
      - name: Install gem dependencies
        run: bundle config set --local disable_checksum_validation true && bundle install
        working-directory: packages/octicons_helper
      - name: Lint
        run: bundle exec rake lint
        working-directory: packages/octicons_helper
      - name: Test
        run: bundle exec rake test
        working-directory: packages/octicons_helper

  octicons_jekyll:
    name: 'gem:octicons_jekyll'
    runs-on: ubuntu-latest
    needs: octicons_gem
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true
      - name: Download octicons gem
        uses: actions/download-artifact@v4
        with:
          name: octicons-gem
          path: packages/octicons_jekyll/vendor/cache
      - name: Install gem dependencies
        run: bundle config set --local disable_checksum_validation true && bundle install
        working-directory: packages/octicons_jekyll
      - name: Lint
        run: bundle exec rake lint
        working-directory: packages/octicons_jekyll
      - name: Test
        run: bundle exec rake test
        working-directory: packages/octicons_jekyll
