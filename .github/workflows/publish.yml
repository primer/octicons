name: Octicons Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: cp -r icons lib/build/svg
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: octicons
          path: ./lib/build
  gem:
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: octicons
          path: ./lib/build
      - uses: ./.github/actions/build_ruby
        env:
          RUBYGEMS_TOKEN: ${{ secrets.RUBYGEMS_TOKEN }}
        with:
          args: octicons_gem
      - run: ls ./lib/octicons_gem/pkg
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: octicons_gem
          path: ./lib/octicons_gem/pkg
  helper:
    runs-on: ubuntu-latest
    needs: gem
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: octicons
          path: ./lib/build
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: octicons_gem
          path: ./lib/octicons_helper/vendor/cache
      - uses: ./.github/actions/build_ruby
        env:
          RUBYGEMS_TOKEN: ${{ secrets.RUBYGEMS_TOKEN }}
        with:
          args: octicons_helper
#  node:
#    runs-on: ubuntu-latest
#    needs: setup
#    steps:
#      - uses: actions/checkout@master
#      - uses: actions/download-artifact@v4
#        with:
#          name: octicons
#          path: ./lib/build
#      - uses: ./.github/actions/build_node
#        with:
#          args: octicons_node
  angular:
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      actions: read
      id-token: write # npm publish --provenance (OIDC)
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: octicons
          path: ./lib/build
      - name: Build @openproject/octicons-angular
        uses: ./.github/actions/build_angular
        with:
          args: octicons_angular
