on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read
  checks: write
  statuses: write

name: Octicons Publish
jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - run: cp -r icons lib/build/svg
      - uses: actions/upload-artifact@v4
        with:
          name: octicons
          path: ./lib/build
  gem:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@master
      - uses: actions/download-artifact@v4
        with:
          name: octicons
          path: ./lib/build
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.0
      - name: Determine package version
        id: package
        run: |
          PACKAGE_VERSION=$(ruby -rjson -e "puts JSON.parse(File.read('package.json'))['version']")
          PACKAGE_VERSION=$(echo "$PACKAGE_VERSION" | sed -e 's/^0\.0\.0./0.0.0.pre./g')
          echo "version=$(echo "$PACKAGE_VERSION" | sed -e 's/-rc/.pre/g')" >> "$GITHUB_OUTPUT"
      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_TOKEN: ${{ secrets.RUBYGEMS_TOKEN }}
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_TOKEN" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
      - name: Prepare octicons gem
        working-directory: ./lib/octicons_gem
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          cp -R ../build lib/
          perl -pi -e "s/\"octicons\", \"[^\"]+\"/\"octicons\", \"${PACKAGE_VERSION}\"/" ./Gemfile ./*.gemspec
      - name: Install dependencies
        working-directory: ./lib/octicons_gem
        run: bundle install
      - name: Version octicons gem
        working-directory: ./lib/octicons_gem
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: bundle exec rake version\["$PACKAGE_VERSION"\]
      - name: Update dependencies
        working-directory: ./lib/octicons_gem
        run: bundle update
      - name: Build octicons gem
        working-directory: ./lib/octicons_gem
        run: bundle exec rake build
      - name: Publish octicons gem
        working-directory: ./lib/octicons_gem
        run: |
          GEM_PUSH_OUTPUT=$(gem push pkg/*.gem 2>&1) || {
            echo "$GEM_PUSH_OUTPUT"
            echo "$GEM_PUSH_OUTPUT" | grep -q "Repushing of gem versions is not allowed" || exit 1
          }
      - run: ls ./lib/octicons_gem/pkg
      - uses: actions/upload-artifact@v4
        with:
          name: octicons_gem
          path: ./lib/octicons_gem/pkg
  helper:
    runs-on: ubuntu-latest
    needs: gem
    steps:
      - uses: actions/checkout@master
      - uses: actions/download-artifact@v4
        with:
          name: octicons
          path: ./lib/build
      - uses: actions/download-artifact@v4
        with:
          name: octicons_gem
          path: ./lib/octicons_helper/vendor/cache
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.0
      - name: Determine package version
        id: package
        run: |
          PACKAGE_VERSION=$(ruby -rjson -e "puts JSON.parse(File.read('package.json'))['version']")
          PACKAGE_VERSION=$(echo "$PACKAGE_VERSION" | sed -e 's/^0\.0\.0./0.0.0.pre./g')
          echo "version=$(echo "$PACKAGE_VERSION" | sed -e 's/-rc/.pre/g')" >> "$GITHUB_OUTPUT"
      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_TOKEN: ${{ secrets.RUBYGEMS_TOKEN }}
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_TOKEN" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
      - name: Prepare octicons helper gem
        working-directory: ./lib/octicons_helper
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          cp -R ../build lib/
          perl -pi -e "s/\"octicons\", \"[^\"]+\"/\"octicons\", \"${PACKAGE_VERSION}\"/" ./Gemfile ./*.gemspec
      - name: Install dependencies
        working-directory: ./lib/octicons_helper
        run: bundle install
      - name: Version octicons helper gem
        working-directory: ./lib/octicons_helper
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: bundle exec rake version\["$PACKAGE_VERSION"\]
      - name: Update dependencies
        working-directory: ./lib/octicons_helper
        run: bundle update
      - name: Build octicons helper gem
        working-directory: ./lib/octicons_helper
        run: bundle exec rake build
      - name: Publish octicons helper gem
        working-directory: ./lib/octicons_helper
        run: |
          GEM_PUSH_OUTPUT=$(gem push pkg/*.gem 2>&1) || {
            echo "$GEM_PUSH_OUTPUT"
            echo "$GEM_PUSH_OUTPUT" | grep -q "Repushing of gem versions is not allowed" || exit 1
          }
  jekyll:
    runs-on: ubuntu-latest
    needs: gem
    steps:
      - uses: actions/checkout@master
      - uses: actions/download-artifact@v4
        with:
          name: octicons
          path: ./lib/build
      - uses: actions/download-artifact@v4
        with:
          name: octicons_gem
          path: ./lib/octicons_jekyll/vendor/cache
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.0
      - name: Determine package version
        id: package
        run: |
          PACKAGE_VERSION=$(ruby -rjson -e "puts JSON.parse(File.read('package.json'))['version']")
          PACKAGE_VERSION=$(echo "$PACKAGE_VERSION" | sed -e 's/^0\.0\.0./0.0.0.pre./g')
          echo "version=$(echo "$PACKAGE_VERSION" | sed -e 's/-rc/.pre/g')" >> "$GITHUB_OUTPUT"
      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_TOKEN: ${{ secrets.RUBYGEMS_TOKEN }}
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_TOKEN" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
      - name: Prepare octicons jekyll gem
        working-directory: ./lib/octicons_jekyll
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          cp -R ../build lib/
          perl -pi -e "s/\"octicons\", \"[^\"]+\"/\"octicons\", \"${PACKAGE_VERSION}\"/" ./Gemfile ./*.gemspec
      - name: Install dependencies
        working-directory: ./lib/octicons_jekyll
        run: bundle install
      - name: Version octicons jekyll gem
        working-directory: ./lib/octicons_jekyll
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: bundle exec rake version\["$PACKAGE_VERSION"\]
      - name: Update dependencies
        working-directory: ./lib/octicons_jekyll
        run: bundle update
      - name: Build octicons jekyll gem
        working-directory: ./lib/octicons_jekyll
        run: bundle exec rake build
      - name: Publish octicons jekyll gem
        working-directory: ./lib/octicons_jekyll
        run: |
          GEM_PUSH_OUTPUT=$(gem push pkg/*.gem 2>&1) || {
            echo "$GEM_PUSH_OUTPUT"
            echo "$GEM_PUSH_OUTPUT" | grep -q "Repushing of gem versions is not allowed" || exit 1
          }
  node:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@master
      - uses: actions/download-artifact@v4
        with:
          name: octicons
          path: ./lib/build
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Determine publish metadata
        id: package
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISH_TAG=latest
          if [[ "$PACKAGE_VERSION" =~ ^0\.0\.0\- ]]; then
            PUBLISH_TAG=canary
          elif [[ "$PACKAGE_VERSION" =~ \-rc ]]; then
            PUBLISH_TAG=next
          fi
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$PUBLISH_TAG" >> "$GITHUB_OUTPUT"
      - name: Copy build assets
        working-directory: ./lib/octicons_node
        run: cp -R ../build/ .
      - name: Install dependencies
        working-directory: ./lib/octicons_node
        run: npm install --legacy-peer-deps
      - name: Build @primer/octicons
        working-directory: ./lib/octicons_node
        run: npm run build
      - name: Publish @primer/octicons
        working-directory: ./lib/octicons_node
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          PUBLISH_TAG: ${{ steps.package.outputs.tag }}
        run: npm version --allow-same-version "$PACKAGE_VERSION" && npm publish --tag "$PUBLISH_TAG" --access public || exit 0
  react:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@master
      - uses: actions/download-artifact@v4
        with:
          name: octicons
          path: ./lib/build
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Determine publish metadata
        id: package
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISH_TAG=latest
          if [[ "$PACKAGE_VERSION" =~ ^0\.0\.0\- ]]; then
            PUBLISH_TAG=canary
          elif [[ "$PACKAGE_VERSION" =~ \-rc ]]; then
            PUBLISH_TAG=next
          fi
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$PUBLISH_TAG" >> "$GITHUB_OUTPUT"
      - name: Copy React build assets
        working-directory: ./lib/octicons_react
        run: cp -R ../build/ .
      - name: Install React dependencies
        working-directory: ./lib/octicons_react
        run: npm install --legacy-peer-deps
      - name: Build @primer/octicons-react
        working-directory: ./lib/octicons_react
        run: npm run build
      - name: Publish @primer/octicons-react
        working-directory: ./lib/octicons_react
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          PUBLISH_TAG: ${{ steps.package.outputs.tag }}
        run: npm version --allow-same-version "$PACKAGE_VERSION" && npm publish --tag "$PUBLISH_TAG" --access public || exit 0
      - name: Copy styled build assets
        working-directory: ./lib/octicons_styled
        run: cp -R ../build/ .
      - name: Install styled dependencies
        working-directory: ./lib/octicons_styled
        run: npm install --legacy-peer-deps
      - name: Build @primer/styled-octicons
        working-directory: ./lib/octicons_styled
        run: npm run build
      - name: Publish @primer/styled-octicons
        working-directory: ./lib/octicons_styled
        env:
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          PUBLISH_TAG: ${{ steps.package.outputs.tag }}
        run: npm version --allow-same-version "$PACKAGE_VERSION" && npm publish --tag "$PUBLISH_TAG" --access public || exit 0
